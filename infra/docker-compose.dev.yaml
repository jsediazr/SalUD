services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend/backend
      dockerfile: Dockerfile
    # Este comando intenta hacer un ping al puerto 5432 de la db antes de arrancar nodemon
    command: >
      sh -c "until nc -z db 5432; do
               echo 'Esperando a que la base de datos esté lista...'
               sleep 2
             done;
             echo 'Base de datos conectada. Arrancando Backend...'
             npx nodemon -L src/index.js"
    volumes:
      - ../apps/backend/backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DIALECT=postgres
      - APPOINTMENT_DETAIL_KEY=${APPOINTMENT_DETAIL_KEY}
      - NODE_ENV=development
      - PORT=5000
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  notifications-service:
    build:
      context: ../apps/backend/notifications
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ../apps/backend/notifications:/app
      - /app/node_modules
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      target: development # <--- AGREGAR ESTO
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    stdin_open: true
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0

volumes:
  pgdata:
  pgadmin_data:
  rabbitmq_data:
